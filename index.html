<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Redirecionando...</title>

  <style>
    body{
      margin:0;
      padding:0;
      height:100vh;
      display:flex;
      align-items:center;
      justify-content:center;
      background:#0f172a;
      color:white;
      font-family:Arial, Helvetica, sans-serif;
      flex-direction:column;
    }

    .box{
      text-align:center;
    }

    .loader{
      width:50px;
      height:50px;
      border:5px solid #334155;
      border-top:5px solid #22c55e;
      border-radius:50%;
      animation:spin 1s linear infinite;
      margin:20px auto;
    }

    @keyframes spin{
      100%{
        transform:rotate(360deg);
      }
    }
  </style>
</head>
<body>

<div class="box">
  <h1>Estamos conectando você...</h1>
  <div class="loader"></div>
  <p>Aguarde alguns segundos</p>
</div>

<script>

const atendentes = [

  "https://wa.me/5588999991111?text=Olá%20vim%20pelo%20anúncio",

  "https://wa.me/5588999992222?text=Olá%20vim%20pelo%20anúncio",

  "https://wa.me/5588999993333?text=Olá%20vim%20pelo%20anúncio"

];

const indiceAleatorio = Math.floor(Math.random() * atendentes.length);

setTimeout(() => {
  window.location.href = atendentes[indiceAleatorio];
}, 1500);

</script>

</body>
</html>
