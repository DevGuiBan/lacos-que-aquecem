```html
<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Atendimento WhatsApp</title>

  <style>
    *{
      margin:0;
      padding:0;
      box-sizing:border-box;
      font-family:Arial, Helvetica, sans-serif;
    }

    body{
      background:#0f172a;
      min-height:100vh;
      display:flex;
      align-items:center;
      justify-content:center;
      padding:20px;
      color:white;
    }

    .card{
      width:100%;
      max-width:420px;
      background:#111827;
      border:1px solid #1f2937;
      border-radius:30px;
      padding:35px;
      box-shadow:0 10px 40px rgba(0,0,0,.4);
    }

    .logo{
      width:90px;
      height:90px;
      background:#22c55e;
      border-radius:50%;
      display:flex;
      align-items:center;
      justify-content:center;
      margin:0 auto 20px;
      font-size:40px;
    }

    h1{
      text-align:center;
      margin-bottom:10px;
      font-size:32px;
    }

    .descricao{
      text-align:center;
      color:#94a3b8;
      margin-bottom:30px;
      line-height:1.5;
    }

    .atendente{
      background:#1e293b;
      border-radius:20px;
      padding:18px;
      display:flex;
      justify-content:space-between;
      align-items:center;
      margin-bottom:15px;
    }

    .nome{
      font-weight:bold;
      font-size:17px;
    }

    .cargo{
      color:#94a3b8;
      font-size:14px;
      margin-top:4px;
    }

    .online{
      display:flex;
      align-items:center;
      gap:8px;
      color:#4ade80;
      font-size:14px;
    }

    .bolinha{
      width:10px;
      height:10px;
      background:#4ade80;
      border-radius:50%;
    }

    button{
      width:100%;
      border:none;
      background:#22c55e;
      color:black;
      font-size:18px;
      font-weight:bold;
      padding:18px;
      border-radius:20px;
      cursor:pointer;
      transition:.3s;
      margin-top:15px;
    }

    button:hover{
      transform:scale(1.02);
      background:#4ade80;
    }

    .footer{
      text-align:center;
      margin-top:20px;
      color:#64748b;
      font-size:14px;
    }

    .loading{
      display:none;
      text-align:center;
      margin-top:20px;
    }

    .spinner{
      width:40px;
      height:40px;
      border:4px solid #334155;
      border-top:4px solid #22c55e;
      border-radius:50%;
      margin:0 auto 10px;
      animation:spin 1s linear infinite;
    }

    @keyframes spin{
      100%{
        transform:rotate(360deg);
      }
    }
  </style>
</head>
<body>

  <div class="card">

    <div class="logo">
      💬
    </div>

    <h1>Atendimento</h1>

    <p class="descricao">
      Clique abaixo para falar com um atendente disponível no WhatsApp.
    </p>

    <div class="atendente">
      <div>
        <div class="nome">Lorena</div>
        <div class="cargo">Equipe Comercial</div>
      </div>

      <div class="online">
        <div class="bolinha"></div>
        Online
      </div>
    </div>

    <div class="atendente">
      <div>
        <div class="nome">Carlos</div>
        <div class="cargo">Equipe Comercial</div>
      </div>

      <div class="online">
        <div class="bolinha"></div>
        Online
      </div>
    </div>

    <div class="atendente">
      <div>
        <div class="nome">Amanda</div>
        <div class="cargo">Equipe Comercial</div>
      </div>

      <div class="online">
        <div class="bolinha"></div>
        Online
      </div>
    </div>

    <button onclick="redirecionar()">
      Falar no WhatsApp
    </button>

    <div class="loading" id="loading">
      <div class="spinner"></div>
      <p>Conectando você...</p>
    </div>

    <div class="footer">
      Você será conectado automaticamente.
    </div>

  </div>

  <script>

    const atendentes = [

      "https://wa.me/5588999991111?text=Olá%20vim%20pelo%20anúncio",

      "https://wa.me/5588999992222?text=Olá%20vim%20pelo%20anúncio",

      "https://wa.me/5588999993333?text=Olá%20vim%20pelo%20anúncio"

    ];

    function redirecionar(){

      document.getElementById("loading").style.display = "block";

      const aleatorio = Math.floor(Math.random() * atendentes.length);

      setTimeout(() => {

        window.location.href = atendentes[aleatorio];

      }, 1500);

    }

  </script>

</body>
</html>
