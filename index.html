<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Redirecionando...</title>
</head>
<body>

<script>

const atendentes = [

  {
    nome: "Lorena",
    link: "https://wa.me/5588999991111?text=Olá%20vim%20pelo%20anúncio",
    peso: 50
  },

  {
    nome: "Carlos",
    link: "https://wa.me/5588999992222?text=Olá%20vim%20pelo%20anúncio",
    peso: 30
  },

  {
    nome: "Amanda",
    link: "https://wa.me/5588999993333?text=Olá%20vim%20pelo%20anúncio",
    peso: 20
  }

];

function escolherAtendente() {

  let somaPesos = 0;

  for (let atendente of atendentes) {
    somaPesos += atendente.peso;
  }

  const numeroAleatorio = Math.random() * somaPesos;

  let acumulado = 0;

  for (let atendente of atendentes) {

    acumulado += atendente.peso;

    if (numeroAleatorio <= acumulado) {
      return atendente.link;
    }

  }

}

const linkEscolhido = escolherAtendente();

window.location.href = linkEscolhido;

</script>

</body>
</html>
